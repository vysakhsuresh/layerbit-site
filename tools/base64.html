<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Real-time Base64 Encoder and Decoder for text and images. Secure, client-side data conversion by Layerbit." />
  <title>Base64 Cipher Engine - Layerbit</title>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6072772587431629" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <link href="../layerbit-logo.png" rel="icon" type="image/x-icon" />

  <style>
    /* Ultra-Premium Dark Theme Variables */
    :root {
      --bg-base: #0a0c10;
      --bg-gradient: radial-gradient(circle at 50% 0%, #1a1e2d 0%, #0a0c10 70%);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --card-bg: rgba(20, 22, 30, 0.6);
      --card-border: rgba(255, 255, 255, 0.08);
      --accent-main: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.5);
      --error-border: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text-main);
      background-color: var(--bg-base);
      background-image: var(--bg-gradient);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    header { max-width: 1400px; width: 100%; margin: 0 auto 40px auto; }
    .brand { font-size: 1.6em; font-weight: 700; display: flex; align-items: center; gap: 12px; text-decoration: none; color: #fff; }

    .hero { text-align: center; margin-bottom: 40px; }
    .hero h1 { font-size: 2.8em; margin-bottom: 10px; }
    .hero p { color: var(--text-muted); }

    .tab-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
    .tab-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      padding: 12px 30px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: 0.3s;
    }
    .tab-btn.active { background: rgba(56, 189, 248, 0.1); border-color: var(--accent-main); color: #fff; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .ide-container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .pane { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; height: 500px; display: flex; flex-direction: column; overflow: hidden; }
    .pane-header { background: rgba(0,0,0,0.3); padding: 12px 20px; border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; }

    .btn-action { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 6px 14px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 6px; }

    .editor { flex-grow: 1; padding: 20px; color: var(--text-main); font-family: 'Fira Code', monospace; font-size: 14px; background: transparent; border: none; resize: none; outline: none; }
    .error-text { color: #ef4444; font-size: 0.85em; display: none; }
    .error-text.active { display: inline-block; }

    .dropzone { flex-grow: 1; border: 2px dashed rgba(255,255,255,0.2); margin: 20px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
    .image-preview-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 20px; background: rgba(0,0,0,0.2); overflow: hidden; }
    .image-preview-container img { max-width: 100%; max-height: 100%; border-radius: 8px; display: none; }

    .info-panel { max-width: 1400px; margin: 60px auto; background: rgba(255,255,255,0.02); border: 1px solid var(--card-border); padding: 40px; border-radius: 20px; }
    footer { text-align: center; padding: 40px 0; color: var(--text-muted); border-top: 1px solid var(--card-border); margin-top: auto; }

    @media (max-width: 900px) { .ide-container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <header>
    <a href="../index.html" class="brand">
      <svg width="36" height="36" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="32,20 54,28 32,36 10,28" stroke="#f8fafc" stroke-width="4" stroke-linejoin="round"/>
        <polyline points="10,38 32,46 54,38" stroke="#f8fafc" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="10,48 32,56 54,48" stroke="#f8fafc" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="50" y="10" width="10" height="10" rx="2" fill="#00f2fe" />
      </svg>
      Layerbit
    </a>
  </header>

  <main class="hero">
    <h1>Base64 Cipher Engine</h1>
    <p>Real-time bidirectional encoding and decoding for strings and digital assets.</p>
  </main>

  <div class="tab-container">
    <button class="tab-btn active" onclick="switchTab('text')"><i data-lucide="file-type-2"></i> String Cryptography</button>
    <button class="tab-btn" onclick="switchTab('image')"><i data-lucide="image"></i> Asset Encoding</button>
  </div>

  <div id="tab-text" class="tab-content active">
    <div class="ide-container">
      <div class="pane">
        <div class="pane-header">
          <div class="pane-title">Plain Text</div>
          <div style="display: flex; align-items: center; gap: 15px;">
            <span id="decodeError" class="error-text">Invalid Base64</span>
            <button class="btn-action" onclick="copyContent('plainText', this)">Copy</button>
          </div>
        </div>
        <textarea id="plainText" class="editor" placeholder="Type here to encode..."></textarea>
      </div>
      <div class="pane">
        <div class="pane-header">
          <div class="pane-title">Base64 Encoded</div>
          <button class="btn-action" onclick="copyContent('base64Text', this)">Copy</button>
        </div>
        <textarea id="base64Text" class="editor" placeholder="Paste Base64 here to decode..."></textarea>
      </div>
    </div>
  </div>

  <div id="tab-image" class="tab-content">
    <div class="ide-container">
      <div class="pane">
        <div class="pane-header">
          <div class="pane-title">Image Encoder</div>
          <button class="btn-action" onclick="copyContent('imageOutputText', this)">Copy Base64</button>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display: none;" />
        <label for="fileInput" class="dropzone" id="dropzone">
          <i data-lucide="image-plus"></i>
          <p>Click or Drop Image</p>
        </label>
        <textarea id="imageOutputText" class="editor" style="display:none;" readonly></textarea>
      </div>
      <div class="pane">
        <div class="pane-header">
          <div class="pane-title">Visual Decoder</div>
          <span id="imgDecodeError" class="error-text">Invalid Image Data</span>
        </div>
        <textarea id="imageDecodeInput" class="editor" style="height: 30%; border-bottom: 1px solid rgba(255,255,255,0.1);" placeholder="Paste image Base64 here..."></textarea>
        <div class="image-preview-container">
          <img id="imagePreview" alt="Preview" />
        </div>
      </div>
    </div>
  </div>

  <footer>
    &copy; 2026 <strong>Layerbit Technologies</strong>
  </footer>

  <script>
    lucide.createIcons();

    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      event.currentTarget.classList.add('active');
      document.getElementById('tab-' + tabId).classList.add('active');
    }

    function copyContent(elementId, btnElement) {
      const text = document.getElementById(elementId).value;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        btnElement.innerText = 'Copied!';
        setTimeout(() => { btnElement.innerText = 'Copy'; }, 2000);
      });
    }

    // TEXT LOGIC
    const plainText = document.getElementById('plainText');
    const base64Text = document.getElementById('base64Text');
    const decodeError = document.getElementById('decodeError');

    plainText.addEventListener('input', () => {
      try {
        base64Text.value = btoa(unescape(encodeURIComponent(plainText.value)));
        decodeError.classList.remove('active');
      } catch(e) {}
    });

    base64Text.addEventListener('input', () => {
      const val = base64Text.value.trim();
      if(!val) { plainText.value = ''; decodeError.classList.remove('active'); return; }
      try {
        const decoded = atob(val);
        try {
          plainText.value = decodeURIComponent(escape(decoded));
        } catch(e) {
          plainText.value = decoded;
        }
        decodeError.classList.remove('active');
      } catch (e) {
        decodeError.classList.add('active');
      }
    });

    // IMAGE LOGIC
    const fileInput = document.getElementById('fileInput');
    const imageOutputText = document.getElementById('imageOutputText');
    const imageDecodeInput = document.getElementById('imageDecodeInput');
    const imagePreview = document.getElementById('imagePreview');
    const imgDecodeError = document.getElementById('imgDecodeError');

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        document.getElementById('dropzone').style.display = 'none';
        imageOutputText.style.display = 'block';
        imageOutputText.value = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    imageDecodeInput.addEventListener('input', () => {
      let val = imageDecodeInput.value.trim();
      imgDecodeError.classList.remove('active');
      if(!val) { imagePreview.style.display = 'none'; return; }

      // Core Fix: Check for existing data prefix
      if (!val.startsWith('data:image')) {
        val = 'data:image/png;base64,' + val;
      }
      imagePreview.src = val;
      imagePreview.style.display = 'block';
    });

    imagePreview.addEventListener('error', () => {
      imagePreview.style.display = 'none';
      if(imageDecodeInput.value.trim() !== '') imgDecodeError.classList.add('active');
    });
  </script>
</body>
</html>
